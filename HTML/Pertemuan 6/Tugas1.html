<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            background-color: white;
            margin: 50px auto;
            width: 320px;
            padding: 40px;
            border: solid;
            border-radius: 20px;
            border-color: rgb(100, 177, 255);
            text-align: center;
        }
        .content {
            color: gray;
        }
        .image {
            width: 200px;
            height: 200px;
            border: 8px solid;
            border-color: lightgray;
            border-radius: 360px;
        }
        .name {
            margin: 0px;
            font-size: 24px;
        }
        .student {
            color: rgb(100, 177, 255);
        }
        .button-portofolio {
            margin: 4px auto;
            width: 320px;
            height: 40px;
            color: white;
            font-size: medium;
            border: 0px;
            border-radius: 10px;
            background-color: black;
        }
        .button-portofolio:hover {
            background-color: #f1f1f1;
            color: rgb(40, 40, 78);
        }
        .button-contact {
            margin: 4px auto;
            width: 320px;
            height: 40px;
            color: white;
            font-size: medium;
            border: 0px;
            border-radius: 10px;
            background-color: rgb(100, 177, 255);
        }
        .button-contact:hover {
            background-color: #f1f1f1;
            color: black;
        }
        body {
            background-color: #f1f1f1;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <form method="post" target="_blank">
    <div class="card">
        <img class="image" src="./CowTheKitty.png" alt="">
        <h1 class="name">Cow The Kitty</h1>
        <p class="student">WEB STUDENT</p>
        <p class="content">Sedang belajar dasar-dasar desain web menggunakan HTML dan CSS. Fokus pada kerapihan kode dan pemahaman Box Model.</p>
        <button class="button-portofolio"><b>Kunjungi Portofolio</b></button>
        <button class="button-contact"><b>Hubungi Saya</b></button>
    </div>
</body>
</html>
