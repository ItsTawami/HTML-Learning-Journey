<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            padding: 30px;
            width: 500px;
            margin: 30px auto;
            border-radius: 16px;
            background-color: white;
            text-align: center;
            box-shadow: -8px 0px 0px deepskyblue;
        }
        .content {
            color: gray;
            margin: 20px;
        }
        .image {
            margin-bottom: 0px;
            width: 100px;
            height: 100px;
            border: 3px solid;
            border-color: lightgray;
            border-radius: 360px;
        }
        .job {
            margin: 8px;
            color: deepskyblue;
            font-style: italic;
        }
        .name {
            margin-bottom: 0px;
            font-size: 30px;
            letter-spacing: -1px;
        }
        .title {
            text-align: center;
        }
        body {
            background-color: #f1f1f1;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1 class="title">APA KATA MEREKA?</h1>
    <div class="card">
        <img src="./DarcieThePug.png" alt="" class="image">
        <h1 class="name">
            Darcie The Pug
        </h1>
        <p class="job">
            Dog Expert
        </p>
        <p class="content">
            "Woof woof arf, ruff bow wow woof."
        </p>
        <div>
            <img src="./star.png" alt="" width="20px">
            <img src="./star.png" alt="" width="20px">
            <img src="./star.png" alt="" width="20px">
            <img src="./star.png" alt="" width="20px">
            <img src="./star.png" alt="" width="20px">
        </div>
    </div>
    <div class="card">
        <img src="./CowTheKitty.png" alt="" class="image">
        <h1 class="name">
            Cow The Kitty
        </h1>
        <p class="job">
            Cat Expert
        </p>
        <p class="content">
            "Meow meow mew, mroow purrr prrr! Meow."
        </p>
        <div>
            <img src="./star.png" alt="" width="20px">
            <img src="./star.png" alt="" width="20px">
            <img src="./star.png" alt="" width="20px">
            <img src="./star.png" alt="" width="20px">
            <img src="./star-outline.png" alt="" width="20px">
        </div>
    </div>
</body>
</html>
